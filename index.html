<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система онлайн-опроса в реальном времени</title>
    
    <!-- Подключение внешней библиотеки Chart.js для визуализации диаграмм -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Основные стили страницы */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); 
            margin: 0; 
        }

        /* Стиль карточки опроса */
        .card { 
            width: 350px; 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            text-align: center; 
        }

        h3 { 
            margin-top: 0; 
            color: #2c3e50; 
            font-size: 22px;
            margin-bottom: 25px;
        }

        /* Стили для интерактивных вариантов ответов */
        label { 
            display: flex;
            align-items: center;
            margin: 15px 0; 
            padding: 10px 15px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px; 
            color: #495057; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }

        label:hover {
            background-color: #e9ecef;
            border-color: #dee2e6;
        }

        input[type="radio"] { 
            margin-right: 15px; 
            transform: scale(1.2); 
            cursor: pointer;
        }

        /* Стиль кнопки голосования */
        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #2ecc71; 
            color: white; 
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            transition: all 0.2s ease;
        }

        .btn:hover { 
            background-color: #27ae60; 
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
        }

        /* Контейнер информации о лидере */
        .leader-box { 
            margin-top: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-weight: bold; 
            font-size: 18px; 
            color: #2c3e50;
        }

        /* Круглый цветной маркер лидера */
        .dot { 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            background-color: #ccc; 
            border: 1.5px solid #bdc3c7; 
            transition: background-color 0.5s ease;
        }

        #pollChart {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h3>Лучший язык программирования?</h3>
    
    <!-- Блок радио-кнопок для выбора ответа -->
    <label><input type="radio" name="lang" value="0" checked> JavaScript</label>
    <label><input type="radio" name="lang" value="1"> Python</label>
    <label><input type="radio" name="lang" value="2"> C++</label>
    
    <button id="voteBtn" class="btn" onclick="castVote()">Голосовать</button>

    <!-- Вывод текущего лидера опроса -->
    <div class="leader-box">
        <span>Лидер:</span>
        <span id="leaderName">Загрузка...</span>
        <div id="leaderDot" class="dot"></div>
    </div>
    
    <!-- Область отрисовки диаграммы Chart.js -->
    <canvas id="pollChart" height="220"></canvas>
</div>

<script>
    // Идентификатор нашей выделенной базы данных на сервере JSONBlob
    const binId = "8b3e8e7c-87d5-4554-b4a1-872011b93f2f"; 
    const url = "https://jsonblob.com/api/jsonBlob/" + binId;

    const labels = ['JavaScript', 'Python', 'C++'];
    const colors = ['#f7df1e', '#3776ab', '#00599c']; // Фирменные цвета языков
    let votes = [0, 0, 0];
    let chart;

    // 1. Инициализация и базовая настройка диаграммы Chart.js
    const ctx = document.getElementById('pollChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: labels, 
            datasets: [{ 
                data: votes, 
                backgroundColor: colors,
                borderRadius: 6 // Легкое скругление столбиков
            }] 
        },
        options: { 
            plugins: { legend: { display: false } }, 
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } 
        }
    });

    // 2. Функция асинхронной загрузки данных из облачного хранилища
    async function loadData() {
        try {
            // Запрашиваем данные, добавляя метку времени для обхода кэша браузера
            let res = await fetch(url + '?t=' + Date.now());
            if (res.ok) {
                let data = await res.json();
                if (data && Array.isArray(data.votes)) {
                    votes = data.votes;
                    chart.data.datasets[0].data = votes; // Передаем данные на диаграмму
                    chart.update(); // Перерисовываем диаграмму
                    updateLeaderboard(); // Обновляем информацию о лидере
                }
            }
        } catch (e) { 
            console.log("Синхронизация данных..."); 
        }
    }

    // 3. Функция отправки новых данных на сервер
    async function saveToDb(newVotes) {
        try {
            await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ votes: newVotes })
            });
        } catch (e) { 
            console.error("Ошибка при сохранении на сервере:", e); 
        }
    }

    // 4. Обработчик нажатия на кнопку "Голосовать" (голосование свободное, без блокировок)
    async function castVote() {
        const selected = document.querySelector('input[name="lang"]:checked');
        if (!selected) return;

        const idx = parseInt(selected.value);

        // Перед отправкой скачиваем актуальные данные, чтобы не перезаписать чужие голоса
        try {
            let res = await fetch(url + '?t=' + Date.now());
            if (res.ok) {
                let data = await res.json();
                if (data && Array.isArray(data.votes)) votes = data.votes;
            }
        } catch(e){}

        votes[idx]++; // Добавляем наш голос к выбранному элементу

        // Моментально обновляем интерфейс у себя для отзывчивости
        chart.data.datasets[0].data = votes;
        chart.update();
        updateLeaderboard();

        // Отправляем измененный массив в облачную базу данных
        await saveToDb(votes);
    }

    // 5. Алгоритм вычисления лидера и динамического изменения цвета маркера
    function updateLeaderboard() {
        const max = Math.max(...votes);
        const nameEl = document.getElementById('leaderName');
        const dotEl = document.getElementById('leaderDot');

        if (max === 0) {
            nameEl.innerText = "Нет голосов";
            dotEl.style.backgroundColor = "#ccc"; // Серый цвет, если голосов нет
            return;
        }

        // Вычисляем, сколько вариантов набрали максимальное количество очков
        const leaders = [];
        votes.forEach((v, i) => { if (v === max) leaders.push(i); });

        if (leaders.length > 1) {
            nameEl.innerText = "Ничья";
            dotEl.style.backgroundColor = "#7f8c8d"; // Темный маркер при ничьей
        } else {
            const winner = leaders[0];
            nameEl.innerText = labels[winner]; // Выводим имя лидера
            dotEl.style.backgroundColor = colors[winner]; // Красим индикатор в цвет победителя
        }
    }

    // Запуск первичной загрузки данных при входе на страницу
    loadData();
    
    // Интервал автоматического обновления диаграммы (каждые 3 секунды)
    setInterval(loadData, 3000); 
</script>
</body>
</html>
