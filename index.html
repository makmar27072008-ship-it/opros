<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Опрос в реальном времени</title>
    <!-- Подключаем библиотеку диаграмм -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #eef2f3; margin: 0; }
        .card { width: 320px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h3 { margin-top: 0; color: #333; }
        label { display: block; margin: 12px 0; text-align: left; font-size: 16px; color: #555; cursor: pointer; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.1); }
        .btn { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #4CAF50; color: white; }
        .leader-box { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; font-size: 16px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background-color: #ccc; border: 1px solid #999; }
        #status { font-size: 18px; color: #555; text-align: center; }
    </style>
</head>
<body>

<!-- Экран загрузки -->
<div id="status">Связь с базой данных...</div>

<!-- Карточка опроса -->
<div class="card" id="mainCard" style="display: none;">
    <h3>Лучший язык программирования?</h3>
    <label><input type="radio" name="lang" value="0" checked> JavaScript</label>
    <label><input type="radio" name="lang" value="1"> Python</label>
    <label><input type="radio" name="lang" value="2"> C++</label>
    
    <button id="voteBtn" class="btn" onclick="castVote()">Голосовать</button>

    <div class="leader-box">
        <span>Лидер:</span>
        <span id="leaderName">Загрузка...</span>
        <div id="leaderDot" class="dot"></div>
    </div>
    <canvas id="pollChart" height="200"></canvas>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let pollId = urlParams.get('pollId');

    const labels = ['JavaScript', 'Python', 'C++'];
    const colors = ['#f7df1e', '#3776ab', '#00599c'];
    let votes = [0, 0, 0];
    let chart;

    async function startApp() {
        if (!pollId) {
            // Если зашли без ID, создаем новую ячейку в интернете на JSONBlob
            document.getElementById('status').innerText = 'Создаем таблицу голосов в облаке...';
            try {
                const res = await fetch('https://jsonblob.com/api/jsonBlob', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ votes: [0, 0, 0] })
                });
                // Забираем уникальный ID созданной базы данных
                const newId = res.headers.get('x-jsonblob');
                
                // Перенаправляем браузер на эту же страницу, но уже со своим личным pollId
                window.location.href = window.location.origin + window.location.pathname + '?pollId=' + newId;
            } catch (e) {
                document.getElementById('status').innerText = 'Ошибка сети. Запустите страницу через ссылку GitHub, а не как файл!';
                console.error(e);
            }
        } else {
            // Если ID есть в ссылке, показываем опрос
            document.getElementById('status').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
            initChart();
            await loadData();
            setInterval(loadData, 3000); // Синхронизация каждые 3 секунды
        }
    }

    function initChart() {
        const ctx = document.getElementById('pollChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ data: votes, backgroundColor: colors }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    async function loadData() {
        try {
            const res = await fetch(`https://jsonblob.com/api/jsonBlob/${pollId}`);
            if (res.ok) {
                const data = await res.json();
                if (data && Array.isArray(data.votes)) {
                    votes = data.votes;
                    chart.data.datasets[0].data = votes;
                    chart.update();
                    updateLeaderboard();
                }
            }
        } catch (e) { console.log("Синхронизация..."); }
    }

    async function saveToDb(newVotes) {
        try {
            await fetch(`https://jsonblob.com/api/jsonBlob/${pollId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ votes: newVotes })
            });
        } catch (e) { console.error(e); }
    }

    async function castVote() {
        const selected = document.querySelector('input[name="lang"]:checked');
        if (!selected) return;
        const idx = parseInt(selected.value);

        try {
            const res = await fetch(`https://jsonblob.com/api/jsonBlob/${pollId}`);
            if (res.ok) {
                const data = await res.json();
                if (data && Array.isArray(data.votes)) votes = data.votes;
            }
        } catch(e){}

        votes[idx]++;
        chart.data.datasets[0].data = votes;
        chart.update();
        updateLeaderboard();

        await saveToDb(votes);
    }

    function updateLeaderboard() {
        const max = Math.max(...votes);
        const nameEl = document.getElementById('leaderName');
        const dotEl = document.getElementById('leaderDot');

        if (max === 0) {
            nameEl.innerText = "Нет голосов";
            dotEl.style.backgroundColor = "#ccc";
            return;
        }

        const leaders = [];
        votes.forEach((v, i) => { if (v === max) leaders.push(i); });

        if (leaders.length > 1) {
            nameEl.innerText = "Ничья";
            dotEl.style.backgroundColor = "#888";
        } else {
            const winner = leaders[0];
            nameEl.innerText = labels[winner];
            dotEl.style.backgroundColor = colors[winner];
        }
    }

    startApp();
</script>
</body>
</html>
