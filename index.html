<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система онлайн-опроса</title>
    <!-- Подключаем библиотеку диаграмм -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); 
            margin: 0; 
        }
        .card { 
            width: 320px; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            text-align: center; 
        }
        h3 { margin-top: 0; color: #2c3e50; }
        label { 
            display: block; 
            margin: 12px 0; 
            text-align: left; 
            font-size: 16px; 
            color: #555; 
            cursor: pointer; 
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        input[type="radio"] { margin-right: 10px; transform: scale(1.1); }
        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #2ecc71; 
            color: white; 
        }
        .btn:hover { background-color: #27ae60; }
        .leader-box { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; font-size: 16px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background-color: #ccc; border: 1px solid #999; }
    </style>
</head>
<body>

<div class="card">
    <h3>Лучший язык программирования?</h3>
    <label><input type="radio" name="lang" value="0" checked> JavaScript</label>
    <label><input type="radio" name="lang" value="1"> Python</label>
    <label><input type="radio" name="lang" value="2"> C++</label>
    
    <button id="voteBtn" class="btn" onclick="castVote()">Голосовать</button>

    <div class="leader-box">
        <span>Лидер:</span>
        <span id="leaderName">Загрузка...</span>
        <div id="leaderDot" class="dot"></div>
    </div>
    <canvas id="pollChart" height="200"></canvas>
</div>

<script>
    // Уникальное имя нашей папки на сервере (заменил на свежую, чистую)
    const namespace = 'makmar_opros_final_ultra_v1';
    
    const labels = ['JavaScript', 'Python', 'C++'];
    const colors = ['#f7df1e', '#3776ab', '#00599c'];
    let votes = [0, 0, 0];
    let chart;

    // 1. Рисуем график
    const ctx = document.getElementById('pollChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: votes, backgroundColor: colors }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });

    // Вспомогательная безопасная функция для загрузки одного счетчика
    async function getSingleCount(key) {
        try {
            // Добавляем ?t= чтобы обойти кэш Яндекса и мобильных операторов
            const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}?t=` + Date.now());
            if (res.ok) {
                const data = await res.json();
                return data.count || 0;
            }
        } catch (e) {
            console.log("Ключ еще не создан, возвращаем 0");
        }
        return 0; // Если в облаке пусто или ошибка — возвращаем ноль, а не ломаем код
    }

    // 2. Функция загрузки ВСЕХ данных из облака
    async function loadData() {
        const countJS = await getSingleCount('js');
        const countPy = await getSingleCount('python');
        const countCpp = await getSingleCount('cpp');

        votes = [countJS, countPy, countCpp];

        // Обновляем график на экране
        chart.data.datasets[0].data = votes;
        chart.update();
        updateLeaderboard();
    }

    // 3. Клик по кнопке (Голосовать можно бесконечно для проверки!)
    async function castVote() {
        const selected = document.querySelector('input[name="lang"]:checked');
        if (!selected) return;

        const idx = parseInt(selected.value);
        const keys = ['js', 'python', 'cpp'];
        const activeKey = keys[idx];

        // Моментально прибавляем у себя на экране для анимации
        votes[idx]++;
        chart.data.datasets[0].data = votes;
        chart.update();
        updateLeaderboard();

        // Отправляем БЕЗОПАСНЫЙ запрос на увеличение счетчика в облаке на +1
        try {
            await fetch(`https://api.counterapi.dev/v1/${namespace}/${activeKey}/up?t=` + Date.now());
            loadData(); // Перепроверяем свежие данные из облака
        } catch(e) {
            console.error("Ошибка сети при отправке");
        }
    }

    // 4. Поиск лидера и смена цвета кружка
    function updateLeaderboard() {
        const max = Math.max(...votes);
        const nameEl = document.getElementById('leaderName');
        const dotEl = document.getElementById('leaderDot');

        if (max === 0) {
            nameEl.innerText = "Нет голосов";
            dotEl.style.backgroundColor = "#ccc";
            return;
        }

        const leaders = [];
        votes.forEach((v, i) => { if (v === max) leaders.push(i); });

        if (leaders.length > 1) {
            nameEl.innerText = "Ничья";
            dotEl.style.backgroundColor = "#888";
        } else {
            const winner = leaders[0];
            nameEl.innerText = labels[winner];
            dotEl.style.backgroundColor = colors[winner];
        }
    }

    // Запуск автообновления каждые 3 секунды
    loadData();
    setInterval(loadData, 3000); 
</script>
</body>
</html>
