<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title> Онлайн Опрос</title>
    <!-- Подключаем библиотеку для рисования графиков Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Стили оформления страницы и карточек */
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
            padding: 40px 10px;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); 
            margin: 0; 
        }
        .card { 
            width: 330px; 
            background: white; 
            padding: 25px; 
            border-radius: 14px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            text-align: center; 
        }
        h3 { margin-top: 0; color: #2c3e50; font-size: 18px; line-height: 1.4; }
        
        /* Стили плашек для вариантов ответов */
        label { 
            display: block; 
            margin: 10px 0; 
            text-align: left; 
            font-size: 15px; 
            color: #555; 
            cursor: pointer; 
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        label:hover { background: #e9ecef; }
        input[type="radio"], input[type="checkbox"] { margin-right: 10px; transform: scale(1.1); }
        
        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color:darkgreen ; 
            color: white; 
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: lightgreen; }
        
        .fake-disabled {
            background-color: #bdc3c7 !important;
            color: grey!important;
            cursor: not-allowed !important; 
        }

    </style>
</head>
<body>
<div class="card">
    <h3>Каким языком программирования вы пользуетесь?</h3>
    <label><input type="radio" name="lang" value="0" checked> JavaScript</label>
    <label><input type="radio" name="lang" value="1"> Python</label>
    <label><input type="radio" name="lang" value="2"> C++</label>
    <label><input type="radio" name="lang" value="3"> C#</label>
    <button id="b1" class="btn" onclick="vote1()">Голосовать</button>
    <canvas id="pollChart1" height="200"></canvas>
</div>

<div class="card">
    <h3>Почему вы выбрали этот язык?</h3>
    <label><input type="checkbox" name="reason" value="0"> Быстрое и легкое обучение </label>
    <label><input type="checkbox" name="reason" value="1"> Востребованность </label>
    <label><input type="checkbox" name="reason" value="2"> Сфера применения</label>
    <label><input type="checkbox" name="reason" value="3"> Личные предпочтения</label>
    <button id="b2" class="btn" onclick="vote2()">Голосовать</button>
    <canvas id="pollChart2" height="200"></canvas>
</div>

<div class="card">
    <h3>Вам нравится работать на выбранном языке?</h3>
    <label><input type="radio" name="like" value="0" checked> Да</label>
    <label><input type="radio" name="like" value="1"> Нет</label>
    <button id="b3" class="btn" onclick="vote3()">Голосовать</button>
    <canvas id="pollChart3" height="150"></canvas>
</div>

<script>
    const u1 = 'https://poll-sync-default-rtdb.firebaseio.com/makmar_opros_langs.json';
    const u2 = 'https://poll-sync-default-rtdb.firebaseio.com/makmar_opros_reasons.json';
    const u3 = 'https://poll-sync-default-rtdb.firebaseio.com/makmar_opros_likes.json';

    const L1 = ['JavaScript', 'Python', 'C++', 'C#'];
    const L2 = ['Обучение', 'Рынок', 'Сфера', 'Личное'];
    const L3 = ['Да', 'Нет'];
    
    const C1 = ['YellowGreen', 'Orange', 'SlateBlue', 'Khaki'];
    const C2 = ['Coral', 'GreenYellow', 'Aqua', 'Violet'];
    const C3 = ['Goldenrod', 'SkyBlue'];
    
    let v1 = [0, 0, 0, 0], v2 = [0, 0, 0, 0], v3 = [0, 0];
    let f1 = false, f2 = false, f3 = false, a = false;

    // Упрощенная отрисовка графиков
    const commonOpts = { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } };
    const ch1 = new Chart(document.getElementById('pollChart1'), { type: 'bar', data: { labels: L1, datasets: [{ data: v1, backgroundColor: C1 }] }, options: commonOpts });
    const ch2 = new Chart(document.getElementById('pollChart2'), { type: 'bar', data: { labels: L2, datasets: [{ data: v2, backgroundColor: C2 }] }, options: commonOpts });
    const ch3 = new Chart(document.getElementById('pollChart3'), { type: 'bar', data: { labels: L3, datasets: [{ data: v3, backgroundColor: C3 }] }, options: commonOpts });

    async function load() {
        try {
            let r1 = await fetch(u1 + '?nocache=' + Math.random());
            if (r1.ok) { v1 = await r1.json(); ch1.data.datasets[0].data = v1; ch1.update(); }
            let r2 = await fetch(u2 + '?nocache=' + Math.random());
            if (r2.ok) { v2 = await r2.json(); ch2.data.datasets[0].data = v2; ch2.update(); }
            let r3 = await fetch(u3 + '?nocache=' + Math.random());
            if (r3.ok) { v3 = await r3.json(); ch3.data.datasets[0].data = v3; ch3.update(); }
        } catch (e) { console.log("Связь..."); }
    }

    async function save(url, arr) { try { await fetch(url, { method: 'PUT', body: JSON.stringify(arr) }); } catch (e) {} }

    function check() { if (f1 && f2 && f3 && !a) { alert("Спасибо за участие в опросe!"); a = true; } }

    async function vote1() {
        const sel = document.querySelector('input[name="lang"]:checked');
        if (!sel) return;
        v1[parseInt(sel.value)]++; ch1.update();
        const btn = document.getElementById('b1');
        btn.classList.add('fake-disabled'); btn.innerText = 'Отвечено';
        f1 = true; await save(u1, v1); check();
    }

    async function vote2() {
        const checkedBoxes = document.querySelectorAll('input[name="reason"]:checked');
        if (checkedBoxes.length === 0) return;
        checkedBoxes.forEach(box => v2[parseInt(box.value)]++);
        ch2.update();
        const btn = document.getElementById('b2');
        btn.classList.add('fake-disabled'); btn.innerText = 'Отвечено';
        f2 = true; await save(u2, v2); check();
    }

    async function vote3() {
        const sel = document.querySelector('input[name="like"]:checked');
        if (!sel) return;
        v3[parseInt(sel.value)]++; ch3.update();
        const btn = document.getElementById('b3');
        btn.classList.add('fake-disabled'); btn.innerText = 'Отвечено';
        f3 = true; await save(u3, v3); check();
    }

    load();
    setInterval(load, 3000);
</script>
</body>
</html>
